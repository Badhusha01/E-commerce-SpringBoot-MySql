<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Product</title>
</head>

<body>

<style>
body{
    background-color:#0d0d0d;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    flex-direction:column; /* 🔥 KEY FIX */
}

/* Navbar */
.navbar{
    width:100%;
    position:absolute;
    top:0;
    left:0;
    background-color:#1a1a1a;
    padding:15px;
    border-bottom:1px solid #00ff88;
    text-align:center;
}

.navbar a{
    color:#00ff88;
    margin:0 20px;
    text-decoration:none;
    font-weight:bold;
}

.navbar a:hover{
    color:white;
}

/* Form Container */
.form-container{
    background-color:#1a1a1a;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,255,136,0.2);
    width:320px;
    color:#e6ffe6;
    border:1px solid #00ff88;
    transition:0.3s;
    margin-top:60px; /* 🔥 pushes form below navbar */
}

.form-container:hover{
    transform:scale(1.02);
}

/* Heading */
h2{
    text-align:center;
    margin-bottom:20px;
    color:#00ff88;
}

#h1 {
    width: 320px; /* Matches your form-container width */
    align-self:center; /* Aligns the text inside to the left */
    text-align: left; 
}

#h1 h1 {
    color: white;
    margin-bottom: 0; /* Optional: adds space above the form */
}

/* Input Fields */
input[type=text]{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #00ff88;
    border-radius:5px;
    background-color:#0d0d0d;
    color:#e6ffe6;
}

input[type=text]:focus{
    outline:none;
    box-shadow:0 0 5px #00ff88;
}

/* Button */
input[type=submit]{
    width:100%;
    padding:10px;
    background-color:#00cc66;
    color:black;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s ease;
}

input[type=submit]:hover{
    background-color:#00ff88;
    box-shadow:0 0 10px #00ff88;
}
</style>

<!-- ✅ NAVBAR -->
<div class="navbar">
    <a href="/products">Products</a>

    <a href="#" onclick="goEdit()">Edit by ID</a>

    <a href="#" onclick="goDelete()">Delete by ID</a>
</div>
<div id="h1">
<h1 >Welcome Admin,</h1>
</div>
<!-- ✅ FORM (UNCHANGED LOGIC) -->
<div class="form-container">

<h2>Add Product</h2>

<form action="abc" method="post">

<label>Product Name</label>
<input type="text" name="pname">

<label>Quantity</label>
<input type="text" name="quantity">

<label>Price</label>
<input type="text" name="price">

<label>Image</label>
<input type="text" name="image">

<br><br>
<input type="submit" value="Save Product">

</form>

</div>

<!-- ✅ JS FOR DYNAMIC ID -->
<script>
function goEdit(){
    let id = prompt("Enter a Product ID :");
    if(id){
        window.location.href = "/edit/" + id;
    }
}

function goDelete(){
    let id = prompt("Enter Product ID to Delete:");
    if(id){
        window.location.href = "/del/" + id;
    }
}
</script>

</body>
</html>
