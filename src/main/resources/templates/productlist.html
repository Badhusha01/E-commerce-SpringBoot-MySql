<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products Info</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<style>
.homee{
    background-color:#0d0d0d;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    
}

.btn{
    background-color:#00cc66; /* green */
    color:black;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s ease;
}

.btn:hover{
    background-color:#00ff88; /* brighter green */
    box-shadow:0 0 10px #00ff88;
}

h1{
	color: white;
	text-align: center;
}



</style>

<h1>PRODUCTS SHOW IN STORE !</h1>
<br>

<div class="product-container">

<div th:each="p:${products}" class="product-card">

<h3 th:text="${p.pname}"></h3>
<p>₹ <span th:text="${p.price}"></span></p>
<img th:src="${p.image}" height="250px" width="250px" />
<br>

<form action="/addtocart" method="post">
<input type="hidden" name="id" th:value="${p.id}">
<br>

<table class="table">
<tr>
<td><a th:href="@{/edit/{id}(id=${p.id})}" class="btn" >Edit </a></td>
<td></td>
<td></td>
<td></td>
<td></td>
<td><a th:href="@{/del/{id}(id=${p.id})}" class="btn">Delete</a>
</td>
</tr>
</table>

<br>
<br>
<button type="submit" class="add-btn">Add To Cart</button>
</form>

</div>

</div>

<br>
<div class="homee">
<button class="btn" onclick="goHome()">Go to Home</button>

<script>
function goHome(){
    window.location.href = "/";
}
</script>

</div>

</body>
</html>
