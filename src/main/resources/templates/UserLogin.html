<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
    background-color:#0d0d0d;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Form Container */
.form-container{
    background-color:#1a1a1a;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,255,136,0.2);
    width:320px;
    color:#e6ffe6;
    border:1px solid #00ff88;
    transition:0.3s;
    text-align:left;
}

.form-container:hover{
    transform:scale(1.02);
}

/* Heading */
h2{
    text-align:center;
    margin-bottom:20px;
    color:#00ff88;
}

/* Labels */
label{
    font-size:14px;
}

/* Input Fields */
input[type=text],
input[type=password]{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #00ff88;
    border-radius:5px;
    background-color:#0d0d0d;
    color:#e6ffe6;
}

/* Input Focus */
input:focus{
    outline:none;
    box-shadow:0 0 5px #00ff88;
}

/* Button */
input[type=submit]{
    width:100%;
    padding:10px;
    background-color:#00cc66;
    color:black;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s ease;
}

/* Hover */
input[type=submit]:hover{
    background-color:#00ff88;
    box-shadow:0 0 10px #00ff88;
}
</style>

</head>

<body>

<div class="form-container">

<h2>Login</h2>

<form action="verifieduser" method="post">

<label>User Name</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<br><br>

<input type="submit" value="Login">

</form>

</div>

</body>
</html>
